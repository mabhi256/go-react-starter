global:
  scrape_interval: 30s

remote_write:
  - url: http://localhost:9009/api/v1/push

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: otelcol
    static_configs:
      - targets: ['localhost:8888']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
