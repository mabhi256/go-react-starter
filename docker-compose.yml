services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: xyzmed-backend
    entrypoint: ["/app/api"]
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      - postgres
      - valkey
    restart: unless-stopped

  worker:
    image: xyzmed-backend
    entrypoint: ["/app/worker"]
    env_file: .env
    depends_on:
      - postgres
      - valkey
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xyzmed
      POSTGRES_USER: xyzmed
      POSTGRES_PASSWORD: xyzmed
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xyzmed"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  valkeydata:
